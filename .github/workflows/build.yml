name: build

on:
  pull_request:
    types:
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional tag for published images
        required: false

permissions:
  contents: read
  issues: write
  packages: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'build') && (github.event.action != 'labeled' || github.event.label.name == 'build') && (github.event.action != 'unlabeled' || github.event.label.name == 'build'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clear status labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            for (const name of ['build/success', 'build/failure']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - id: meta
        name: Prepare image metadata
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          raw_tag="${{ github.event.inputs.image_tag }}"
          event_name="${GITHUB_EVENT_NAME}"

          if [ -z "$raw_tag" ]; then
            if [ "$event_name" = "pull_request" ]; then
              pr_number="${{ github.event.pull_request.number }}"
              raw_tag="pr${pr_number}"
            elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              raw_tag="${GITHUB_REF_NAME}"
            else
              raw_tag="sha-${GITHUB_SHA::7}"
            fi
          fi

          tag="$(echo "$raw_tag" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
          registry="ghcr.io/${owner}"

          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "prerunner_image=${registry}/virt-prerunner:${tag}" >> "$GITHUB_OUTPUT"
          echo "controller_image=${registry}/virt-controller:${tag}" >> "$GITHUB_OUTPUT"
          echo "daemon_image=${registry}/virt-daemon:${tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push virt-prerunner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/virt-prerunner/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.prerunner_image }}

      - name: Build and push virt-controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/virt-controller/Dockerfile
          build-args: |
            PRERUNNER_IMAGE=${{ steps.meta.outputs.prerunner_image }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.controller_image }}

      - name: Build and push virt-daemon
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/virt-daemon/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.daemon_image }}

      - name: Download skaffold
        shell: bash
        run: |
          curl -sLo /tmp/skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x /tmp/skaffold

      - name: Render manifest
        shell: bash
        run: |
          /tmp/skaffold render \
            --offline=true \
            --default-repo="" \
            --digest-source=tag \
            --images "${{ steps.meta.outputs.controller_image }},${{ steps.meta.outputs.daemon_image }}" \
            > virtink.yaml

      - name: Write build summary
        shell: bash
        run: |
          {
            echo "# Test build"
            echo
            echo "Controller image: \`${{ steps.meta.outputs.controller_image }}\`"
            echo
            echo "Daemon image: \`${{ steps.meta.outputs.daemon_image }}\`"
            echo
            echo "Prerunner image: \`${{ steps.meta.outputs.prerunner_image }}\`"
            echo
            echo "Manifest artifact: \`virtink.yaml\`"
          } > build-info.md

      - uses: actions/upload-artifact@v4
        with:
          name: virtink-${{ steps.meta.outputs.tag }}
          path: |
            virtink.yaml
            build-info.md

      - name: Add success label
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['build/success'],
            });

      - name: Add failure label
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['build/failure'],
            });
