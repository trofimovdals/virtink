name: e2e

on:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  e2e:
    runs-on: self-hosted
    env:
      BASH_ENV: ${{ github.workspace }}/.github/bash_env_timestamp.sh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.1

      - run: make e2e
