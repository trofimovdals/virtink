name: pr-labels

on:
  pull_request_target:
    types:
      - opened

permissions:
  issues: write

jobs:
  add-default-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['test', 'build'],
            });
