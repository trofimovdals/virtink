name: pr-status-labels

on:
  workflow_run:
    workflows:
      - test
      - build
    types:
      - completed

permissions:
  actions: read
  issues: write

jobs:
  update-labels:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const workflow = context.payload.workflow_run.name;
            const pr = context.payload.workflow_run.pull_requests[0];

            const prefix =
              workflow === 'test' ? 'test' :
              workflow === 'build' ? 'build' :
              null;

            if (!prefix || !pr) {
              return;
            }

            for (const name of [`${prefix}/success`, `${prefix}/failure`]) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            const conclusion = context.payload.workflow_run.conclusion;
            if (conclusion !== 'success' && conclusion !== 'failure') {
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [`${prefix}/${conclusion}`],
            });
