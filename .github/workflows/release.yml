name: release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BASH_ENV: ${{ github.workspace }}/.github/bash_env_timestamp.sh
    steps:
      - uses: actions/checkout@v4

      - id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build_virt_prerunner
        shell: bash
        run: |
          metadata_file="$(mktemp)"
          ./hack/build-and-push-image.sh \
            --file build/virt-prerunner/Dockerfile \
            --metadata-file "${metadata_file}" \
            --tag "smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}"
          echo "digest=$(jq -r '.\"containerimage.digest\"' "${metadata_file}")" >> "$GITHUB_OUTPUT"

      - id: build_virt_controller
        shell: bash
        run: |
          metadata_file="$(mktemp)"
          ./hack/build-and-push-image.sh \
            --file build/virt-controller/Dockerfile \
            --build-arg "PRERUNNER_IMAGE=smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_prerunner.outputs.digest }}" \
            --metadata-file "${metadata_file}" \
            --tag "smartxworks/virt-controller:${{ steps.get_version.outputs.version }}"
          echo "digest=$(jq -r '.\"containerimage.digest\"' "${metadata_file}")" >> "$GITHUB_OUTPUT"

      - id: build_virt_daemon
        shell: bash
        run: |
          metadata_file="$(mktemp)"
          ./hack/build-and-push-image.sh \
            --file build/virt-daemon/Dockerfile \
            --metadata-file "${metadata_file}" \
            --tag "smartxworks/virt-daemon:${{ steps.get_version.outputs.version }}"
          echo "digest=$(jq -r '.\"containerimage.digest\"' "${metadata_file}")" >> "$GITHUB_OUTPUT"

      - shell: bash
        run: |
          ./hack/build-and-push-image.sh \
            --file build/virtink-container-disk-base/Dockerfile \
            --tag "smartxworks/virtink-container-disk-base"

      - shell: bash
        run: |
          ./hack/build-and-push-image.sh \
            --file build/virtink-kernel-base/Dockerfile \
            --tag "smartxworks/virtink-kernel-base"

      - shell: bash
        run: |
          ./hack/build-and-push-image.sh \
            --file build/virtink-container-rootfs-base/Dockerfile \
            --tag "smartxworks/virtink-container-rootfs-base"

      - env:
          SKAFFOLD: /tmp/skaffold
          CONTROLLER_IMAGE: smartxworks/virt-controller:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_controller.outputs.digest }}
          DAEMON_IMAGE: smartxworks/virt-daemon:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_daemon.outputs.digest }}
          PRERUNNER_IMAGE: smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_prerunner.outputs.digest }}
        run: |
          curl -sLo /tmp/skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x /tmp/skaffold
          ./hack/render-manifest.sh > virtink.yaml

      - uses: softprops/action-gh-release@v2
        with:
          files: virtink.yaml
