name: release

on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      BASH_ENV: ${{ github.workspace }}/.github/bash_env_timestamp.sh
    steps:
      - uses: actions/checkout@v2

      - id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v2

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build_virt_prerunner
        uses: docker/build-push-action@v2
        with:
          file: build/virt-prerunner/Dockerfile
          tags: smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true

      - id: build_virt_controller
        uses: docker/build-push-action@v2
        with:
          file: build/virt-controller/Dockerfile
          build-args: PRERUNNER_IMAGE=smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_prerunner.outputs.digest }}
          tags: smartxworks/virt-controller:${{ steps.get_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true

      - id: build_virt_daemon
        uses: docker/build-push-action@v2
        with:
          file: build/virt-daemon/Dockerfile
          tags: smartxworks/virt-daemon:${{ steps.get_version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true

      - uses: docker/build-push-action@v2
        with:
          file: build/virtink-container-disk-base/Dockerfile
          tags: smartxworks/virtink-container-disk-base
          platforms: linux/amd64,linux/arm64
          push: true

      - uses: docker/build-push-action@v2
        with:
          file: build/virtink-kernel-base/Dockerfile
          tags: smartxworks/virtink-kernel-base
          platforms: linux/amd64,linux/arm64
          push: true

      - uses: docker/build-push-action@v2
        with:
          file: build/virtink-container-rootfs-base/Dockerfile
          tags: smartxworks/virtink-container-rootfs-base
          platforms: linux/amd64,linux/arm64
          push: true

      - env:
          SKAFFOLD: /tmp/skaffold
          CONTROLLER_IMAGE: smartxworks/virt-controller:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_controller.outputs.digest }}
          DAEMON_IMAGE: smartxworks/virt-daemon:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_daemon.outputs.digest }}
          PRERUNNER_IMAGE: smartxworks/virt-prerunner:${{ steps.get_version.outputs.version }}@${{ steps.build_virt_prerunner.outputs.digest }}
        run: |
          curl -sLo /tmp/skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x /tmp/skaffold
          ./hack/render-manifest.sh > virtink.yaml

      - uses: softprops/action-gh-release@v1
        with:
          files: virtink.yaml
