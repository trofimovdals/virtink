name: test

on:
  push:
  pull_request:
    types:
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  issues: write

jobs:
  test:
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'test') && (github.event.action != 'labeled' || github.event.label.name == 'test') && (github.event.action != 'unlabeled' || github.event.label.name == 'test'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Clear status labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            for (const name of ['test/success', 'test/failure']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - uses: actions/setup-go@v2
        with:
          go-version: 1.25.1

      - run: make test

      - uses: codecov/codecov-action@v2

      - name: Add success label
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['test/success'],
            });

      - name: Add failure label
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['test/failure'],
            });
