name: test

on:
  push:
  pull_request:
    types:
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'test') && (github.event.action != 'labeled' || github.event.label.name == 'test') && (github.event.action != 'unlabeled' || github.event.label.name == 'test'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-go@v2
        with:
          go-version: 1.25.1

      - run: make test

      - uses: codecov/codecov-action@v2
