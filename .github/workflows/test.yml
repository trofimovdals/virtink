name: test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASH_ENV: ${{ github.workspace }}/.github/bash_env_timestamp.sh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.1

      - run: make test

      - uses: codecov/codecov-action@v5
